<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>" />
</head>
<body>

<!-- ─── App Shell (flex column) ──────────────────────────────────────── -->
<div class="app-shell">

<!-- ─── Top Dock Bar (nav dock + controls dock, same style) ─────────────── -->
<div class="topdock-wrap">
  <!-- Left: Navigation Dock -->
  <div class="topdock" id="topdock">
    <div class="dk active" data-page="dashboard">
      <span class="dk-icon">🏠</span>
      <span class="dk-label">主页</span>
    </div>
    <div class="dk" data-page="sessions">
      <span class="dk-icon">💬</span>
      <span class="dk-label">会话</span>
    </div>
    <div class="dk" data-page="tokens">
      <span class="dk-icon">📊</span>
      <span class="dk-label">配额</span>
    </div>
    <div class="dk" data-page="channels">
      <span class="dk-icon">📡</span>
      <span class="dk-label">频道</span>
    </div>
    <div class="dk" data-page="models">
      <span class="dk-icon">🤖</span>
      <span class="dk-label">模型</span>
    </div>
    <div class="dk" data-page="skills">
      <span class="dk-icon">⚙️</span>
      <span class="dk-label">技能</span>
    </div>
    <div class="dk" data-page="cron">
      <span class="dk-icon">⏰</span>
      <span class="dk-label">定时</span>
    </div>
    <div class="dk" data-page="logs">
      <span class="dk-icon">📋</span>
      <span class="dk-label">日志</span>
    </div>
  </div>

  <!-- Right: Controls Dock (theme + avatar) -->
  <div class="topdock-right" id="topdock-right">
    <div id="theme-toggle" title="切换主题" style="display:flex;align-items:center;padding:5px 10px;border-radius:10px;cursor:pointer;color:var(--ink-2);">
      <span style="font-size:18px;line-height:1;">☀️</span>
    </div>
    <!-- Expanded controls (hidden by default, slide in when expanded) -->
    <div class="right-controls-expanded" id="right-controls-expanded" style="display:flex;align-items:center;gap:6px;opacity:0;transform:translateX(12px);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);overflow:hidden;white-space:nowrap;">
      <div class="right-control-item" id="rc-account" onclick="navigate('account'); toggleRightDock();" style="padding:5px 12px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--ink-2);transition:background 0.18s,color 0.18s;" onmouseover="this.style.background='var(--surface-2)';this.style.color='var(--ink)'" onmouseout="this.style.background='';this.style.color='var(--ink-2)'">账号管理</div>
      <div class="right-control-item" onclick="doLogout(); toggleRightDock();" style="padding:5px 12px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--red);transition:background 0.18s;" onmouseover="this.style.background='rgba(255,59,48,0.1)'" onmouseout="this.style.background=''">退出</div>
    </div>
    <div id="avatar-btn" title="账号管理" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--blue);font-size:14px;cursor:pointer;flex-shrink:0;position:relative;">
      🦞
    </div>
  </div>
</div>

<!-- ─── Login Overlay ───────────────────────────────────────────────── -->
<div id="login-overlay" class="login-overlay" style="display:none;">
  <div class="login-card">
    <div class="login-logo">🦞</div>
    <div class="login-title">Hermes Dashboard</div>
    <div class="login-form">
      <div class="login-field">
        <label class="login-label">用户名</label>
        <input class="login-input" id="li-username" type="text" placeholder="用户名" autocomplete="username" />
      </div>
      <div class="login-field">
        <label class="login-label">密码</label>
        <input class="login-input" id="li-password" type="password" placeholder="密码" autocomplete="current-password" />
      </div>
      <div class="login-error" id="li-error" style="display:none;"></div>
      <button class="login-btn" id="li-submit">登录</button>
    </div>
  </div>
</div>

<!-- ─── Main Content ─────────────────────────────────────────────── -->
<main class="page" id="app">
  <div class="loading"><div class="spinner-lg"></div>加载中…</div>
</main>

</div><!-- .app-shell -->

<script>

/* ─── State ──────────────────────────────────────────────────────── */
const API = '/api';
let currentPage = 'dashboard';
let cache = {};
let toastTimer = null;
let currentUser = null;

/* ─── Source Labels (shared) ──────────────────────────────────────── */
const srcLabels = {
  weixin: 'Weixin', telegram: 'Telegram', discord: 'Discord',
  slack: 'Slack', whatsapp: 'WhatsApp', mattermost: 'Mattermost',
  cron: 'Cron', tui: 'TUI', unknown: '未知'
};

/* ─── Util ────────────────────────────────────────────────────────── */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
/* ─── Auth: localStorage token (bypasses proxy cookie issues) ────────────── */
const getToken = () => localStorage.getItem('hermes_token') || '';
const setToken = t => { if (t) localStorage.setItem('hermes_token', t); else localStorage.removeItem('hermes_token'); };
const authHeaders = () => { const t = getToken(); return t ? { 'Authorization': 'Bearer ' + t } : {}; };

/* ─── API ───────────────────────────────────────────────────────────────── */
const api = path => fetch(API + path, { headers: authHeaders(), credentials: 'include' }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });

function timeAgo(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso.endsWith('Z') ? iso : iso.replace(' ', 'T'));
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 5) return '刚刚';
    if (diff < 60) return Math.floor(diff) + 's 前';
    if (diff < 3600) return Math.floor(diff / 60) + 'm 前';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h 前';
    return Math.floor(diff / 86400) + 'd 前';
  } catch { return '—'; }
}

function fmtNum(n) {
  if (n == null) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function fmtCost(cny) {
  if (cny == null) return '—';
  return '¥' + Number(cny).toFixed(2);
}

function getBarColor(used, limit) {
  if (!limit) return 'bar-green';
  const pct = used / limit * 100;
  if (pct < 50) return 'bar-green';
  if (pct < 80) return 'bar-orange';
  return 'bar-red';
}

function fmtBytes(n) {
  if (n == null) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(1) + ' GB';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + ' MB';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + ' KB';
  return n + ' B';
}

function toast(msg, type = 'default') {
  if (toastTimer) clearTimeout(toastTimer);
  const old = $('.toast');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 2500);
}

function chLogo(source) {
  const map = { telegram: 'telegram', weixin: 'weixin', wechat: 'weixin', discord: 'discord', slack: 'slack', whatsapp: 'whatsapp', mattermost: 'mattermost', cron: 'telegram', tui: 'telegram' };
  return 'ch-logo ch-logo-' + (map[source?.toLowerCase()] || 'default');
}
function chEmoji(source) {
  const map = { telegram: '✈️', weixin: '💬', wechat: '💬', discord: '🎮', slack: '💼', whatsapp: '📱', mattermost: '💬', cron: '⏰', tui: '🖥️' };
  return map[source?.toLowerCase()] || '❓';
}
function badgeClass(status) {
  const map = { online: 'badge-online', error: 'badge-error', offline: 'badge-offline', unused: 'badge-unused', unconfigured: 'badge-unconfigured', unknown: 'badge-unknown', reconnecting: 'badge-reconnecting' };
  return 'badge ' + (map[status] || 'badge-unknown');
}
function statusLabel(status) {
  const map = { online: '在线', error: '错误', offline: '离线', unused: '未用', unconfigured: '未配置', unknown: '未知', reconnecting: '重连中' };
  return map[status] || status;
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
const escHtml = escapeHtml;

/* ─── Simple Markdown Renderer ───────────────────────────────────── */
function renderMarkdown(text) {
  if (!text) return '';
  return String(text)
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<pre><code class="lang-${lang}">${escaped}</code></pre>`;
    })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

/* ─── Navigation ─────────────────────────────────────────────────── */
document.querySelector('#topdock').addEventListener('click', e => {
  const item = e.target.closest('.dk[data-page]');
  if (!item) return;
  $$('.dk').forEach(el => el.classList.remove('active'));
  item.classList.add('active');
  navigate(item.dataset.page);
});

function navigate(page) {
  currentPage = page;
  sessionStorage.setItem('hermes-page', page); // persist across refresh on mobile
  // Sync URL hash so browser refresh keeps the current page
  if (window.location.hash.slice(1) !== page) {
    _skipNextHash = true;
    window.location.hash = page;
  }
  window.scrollTo({ top: 0 });
  switch (page) {
    case 'dashboard': renderDashboard(); break;
    case 'channels':  renderChannels();  break;
    case 'sessions':  renderSessions();  break;
    case 'tokens':    renderTokens();    break;
    case 'cron':      renderCron();      break;
    case 'models':    renderModels();    break;
    case 'skills':    renderSkills();    break;
    case 'account':   renderAccount();   break;
    case 'logs':      renderLogs();      break;
    default:          renderDashboard();
  }
}

/* ─── RENDER: Dashboard ───────────────────────────────────────────── */

async function renderDashboard() {
  $('#app').innerHTML = '<div class="loading"><div class="spinner-lg"></div>加载中…</div>';
  try {
    let [stats, quota] = await Promise.all([api('/stats'), api('/quota')]);
    cache.stats = stats;

    const totalSessions = stats.total_sessions || 0;
    const totalMessages = stats.total_messages || 0;
    const totalTokens   = (stats.total_input_tokens || 0) + (stats.total_output_tokens || 0);
    const totalCost     = stats.total_cost_cny || 0;
    const activeCh       = (stats.channels || []).filter(c => c.status === 'online').length;
    const uptime         = stats.uptime || '—';
    const quotaAvailable = quota.quota_available !== false;
    const weeklyUsedK    = quotaAvailable ? fmtNum(quota.models[0]?.weekly_used ?? 0) : '—';

    const recentGroups = {};
    (stats.recent_sessions || []).forEach(s => {
      const src = s.source || 'unknown';
      if (!recentGroups[src]) recentGroups[src] = [];
      recentGroups[src].push(s);
    });
    const srcOrder = ['weixin','telegram','discord','slack','whatsapp','mattermost','cron','tui','cli','unknown'];
    const sortedSrcs = Object.keys(recentGroups).sort((a, b) => {
      const ai = srcOrder.indexOf(a), bi = srcOrder.indexOf(b);
      return (ai===-1?99:ai) - (bi===-1?99:bi);
    });

    const heroIcons = { sessions: '💬', messages: '📨', tokens: '🔥', channels: '📡' };

    // Only show sources that have at least one truly active session
    // Active sessions: each session individually displayed (not grouped by source)
    const allRecentSessions = [...(stats.recent_sessions || [])]
      .filter(s => isTrulyActive(s))
      .sort((a, b) => new Date(b.started_at) - new Date(a.started_at))
      .slice(0, 20);

    const srcEmoji = { weixin:'💬',telegram:'✈️',discord:'🎮',slack:'💼',whatsapp:'📱',mattermost:'💬',cron:'⏰',tui:'⌨️',cli:'>',unknown:'🌐' };

    const activeSessionsHTML = allRecentSessions.length
      ? allRecentSessions.map(s => {
          const src = s.source || 'unknown';
          const emoji = srcEmoji[src] || '💬';
          const topic = s.topic || s.session_id || src;
          const tokens = (s.input_tokens || 0) + (s.output_tokens || 0);
          const isActive = isTrulyActive(s);
          return `<div class="as-item${isActive ? ' active' : ''}" data-session-id="${s.id}">
            <div class="as-item-icon"><div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface-2);border-radius:8px;flex-shrink:0">${emoji}</div></div>
            <div class="as-item-body">
              <div class="as-item-topic">${topic}</div>
              <div class="as-item-meta">
                <span class="as-item-src">${srcLabels[src]||src}</span>
                <span class="as-item-sep">·</span>
                <span class="as-item-tokens">${fmtNum(tokens)} tokens</span>
              </div>
            </div>
            <div class="as-item-time">${timeAgo(s.started_at)}</div>
          </div>`;
        }).join('')
      : '';

  // two-col: 频道状态 + 活跃会话，各占一半，活跃会话在下面
  const dashboardHTML = `
      <!-- Version Banner -->
      <div class="version-banner" id="version-banner">
        <div class="vb-logo">🦞</div>
        <div class="vb-info">
          <div class="vb-title">
            Hermes Agent
            <span class="vb-version-badge" id="vb-local-ver">v—</span>
          </div>
          <div class="vb-sub" id="vb-sub">检查版本中…</div>
        </div>
        <div class="vb-actions" id="vb-actions"></div>
      </div>
      <!-- Changelog Panel (hidden by default) -->
      <div class="changelog-panel" id="changelog-panel"></div>

      <div class="hero-grid">
        <div class="hero-card">
          <div class="hero-card-icon">💬</div>
          <div class="hero-card-label">会话总数</div>
          <div class="hero-card-value">${fmtNum(totalSessions)}</div>
          <div class="hero-card-sub"><strong>${fmtNum(totalMessages)}</strong> 条消息</div>
        </div>
        <div class="hero-card">
          <div class="hero-card-icon">📨</div>
          <div class="hero-card-label">消息总数</div>
          <div class="hero-card-value">${fmtNum(totalMessages)}</div>
          <div class="hero-card-sub"><strong>${totalSessions}</strong> 个会话</div>
        </div>
        <div class="hero-card">
          <div class="hero-card-icon">🔥</div>
          <div class="hero-card-label">Token 消耗</div>
          <div class="hero-card-value">${fmtNum(totalTokens)}</div>
          <div class="hero-card-sub"><strong>${fmtCost(totalCost)}</strong> · 本周已用 ${weeklyUsedK}</div>
        </div>
        <div class="hero-card">
          <div class="hero-card-icon">📡</div>
          <div class="hero-card-label">活跃渠道</div>
          <div class="hero-card-value">${activeCh}</div>
          <div class="hero-card-sub"><strong>${activeCh} 个在线</strong> · ${uptime} 运行</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title-row">
          <div class="card-title">
            <span class="card-title-icon">◆</span>
            <span id="qb-model-title">—</span>
          </div>
          ${quotaAvailable ? '<button class="card-action-btn" id="qb-refresh-btn">刷新</button>' : ''}
        </div>
        ${quotaAvailable ? `
        <div class="qb-body">
          <div class="qb-bar-row">
            <div class="qb-bar-row-inner">
              <span class="qb-bar-label">每轮配额</span>
              <span class="qb-bar-num" id="qb-interval-num">— / —</span>
            </div>
            <div class="qb-bar-track"><div class="qb-bar-fill bar-green" id="qb-interval-fill-bar"></div></div>
          </div>
          <div class="qb-bar-row">
            <div class="qb-bar-row-inner">
              <span class="qb-bar-label">每周配额</span>
              <span class="qb-bar-num" id="qb-weekly-num">— / —</span>
            </div>
            <div class="qb-bar-track"><div class="qb-bar-fill bar-green" id="qb-weekly-fill-bar"></div></div>
          </div>
          <div class="qb-bar-row">
            <div class="qb-bar-row-inner">
              <span class="qb-bar-label">每月配额</span>
              <span class="qb-bar-num" id="qb-monthly-num">— / —</span>
            </div>
            <div class="qb-bar-track"><div class="qb-bar-fill bar-green" id="qb-monthly-fill-bar"></div></div>
          </div>
          <div class="qb-detail-grid">
            <div class="qb-detail-cell"><div class="qb-dc-label">本周剩余</div><div class="qb-dc-val" id="qb-dc-weekly-remain">—</div></div>
            <div class="qb-detail-cell"><div class="qb-dc-label">每轮上限</div><div class="qb-dc-val" id="qb-dc-interval-total">—</div></div>
            <div class="qb-detail-cell"><div class="qb-dc-label">每轮剩余</div><div class="qb-dc-val" id="qb-dc-interval-remain">—</div></div>
            <div class="qb-detail-cell"><div class="qb-dc-label">每轮刷新</div><div class="qb-dc-val" id="qb-dc-interval-reset">—</div></div>
            <div class="qb-detail-cell"><div class="qb-dc-label">每周刷新</div><div class="qb-dc-val" id="qb-dc-weekly-reset">—</div></div>
            <div class="qb-detail-cell"><div class="qb-dc-label">每月刷新</div><div class="qb-dc-val" id="qb-dc-monthly-reset">—</div></div>
          </div>
        </div>
        ` : (quota.usage_stats ? `
        <div class="qb-body">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
            <div style="text-align:center;padding:12px 8px;background:var(--surface-2);border-radius:12px">
              <div style="font-size:20px;font-weight:700;color:var(--ink)">${fmtNum(((quota.today||{}).in||0) + ((quota.today||{}).out||0))}</div>
              <div style="font-size:11px;color:var(--ink-3);margin-top:2px">今日 Tokens</div>
            </div>
            <div style="text-align:center;padding:12px 8px;background:var(--surface-2);border-radius:12px">
              <div style="font-size:20px;font-weight:700;color:var(--ink)">${fmtNum(((quota.week||{}).in||0) + ((quota.week||{}).out||0))}</div>
              <div style="font-size:11px;color:var(--ink-3);margin-top:2px">本周 Tokens</div>
            </div>
            <div style="text-align:center;padding:12px 8px;background:var(--surface-2);border-radius:12px">
              <div style="font-size:20px;font-weight:700;color:var(--blue)">${fmtCost((quota.month||{}).cost||0)}</div>
              <div style="font-size:11px;color:var(--ink-3);margin-top:2px">本月费用</div>
            </div>
          </div>
          ${(quota.models||[]).length > 0 ? `
          <div style="font-size:12px;color:var(--ink-3);font-weight:600;margin-bottom:8px">模型用量</div>
          ${quota.models.slice(0,5).map(m => {
            const total = m.in + m.out;
            const maxTotal = Math.max(1, ...quota.models.map(x => x.in + x.out));
            const pct = Math.round(total / maxTotal * 100);
            return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <div style="font-size:12px;color:var(--ink-2);width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0" title="${escapeHtml(m.name)}">${escapeHtml(m.name)}</div>
              <div style="flex:1;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:var(--blue);border-radius:3px"></div>
              </div>
              <div style="font-size:11px;color:var(--ink-3);width:60px;text-align:right;flex-shrink:0">${fmtNum(total)}</div>
            </div>`;
          }).join('')}
          ` : ''}
        </div>
        ` : `
        <div style="padding:24px 16px;text-align:center">
          <div style="font-size:32px;margin-bottom:8px">📊</div>
          <div style="font-size:13px;color:var(--ink-2);margin-bottom:4px">${escapeHtml(quota.message || '暂无数据')}</div>
          <div style="font-size:12px;color:var(--ink-3)">Provider: ${escapeHtml(quota.provider || '—')} · Model: ${escapeHtml(quota.model || '—')}</div>
        </div>
        `)}
      </div>

      <div class="card-row-2col">
        <div class="card card-col">
          <div class="card-title-row">
            <div class="card-title"><span class="card-title-icon">◆</span>频道状态</div>
            <button class="card-action-btn" onclick="navigate('channels')">管理</button>
          </div>
          <div class="ch-list">
          ${(stats.channels||[]).map(c => {
            return `<div class="rc-item">
              <div class="ch-logo ${chLogo(c.name)}" style="width:32px;height:32px;font-size:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${chEmoji(c.name)}</div>
              <span class="rc-name">${(srcLabels[c.name]||c.name)}</span>
              <span class="status-dot status-dot-${c.status}"></span>
              <span class="rc-status">${statusLabel(c.status)}</span>
              <span class="rc-time">${c.last_active?timeAgo(c.last_active):'从未'}</span>
            </div>`;
          }).join('')}
          </div>
        </div>

        <div class="card card-col">
          <div class="card-title-row">
            <div class="card-title"><span class="card-title-icon">◆</span>活跃会话</div>
            <button class="card-action-btn" onclick="navigate('sessions')">查看全部</button>
          </div>

let _versionData = null;
let _changelogOpen = false;

/* ─── Changelog localStorage cache ──────────────────────────────── */
const CL_CACHE_KEY = 'hermes_cl_'; // prefix, actual key = CL_CACHE_KEY + version

function _getCachedChangelog(version) {
  try {
    const raw = localStorage.getItem(CL_CACHE_KEY + version);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}
function _setCachedChangelog(version, data) {
  try {
    // Clear old caches
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith(CL_CACHE_KEY) && !k.endsWith(version)) {
        localStorage.removeItem(k);
      }
    }
    localStorage.setItem(CL_CACHE_KEY + version, JSON.stringify(data));
  } catch {}
}

async function _checkVersion() {
  const el = {
    local: $('#vb-local-ver'),
    sub: $('#vb-sub'),
    actions: $('#vb-actions'),
  };
  if (!el.local) return;

  try {
    const data = await api('/version');
    _versionData = data;

    // Local version badge
    el.local.textContent = 'v' + (data.local_version || '—');

    // Sub text + latest badge
    if (data.update_available) {
      el.sub.innerHTML = `<span class="vb-version-badge vb-update-badge">⬆ v${escapeHtml(data.latest_version)}</span> 有新版本可用`;
    } else if (data.latest_version) {
      el.sub.innerHTML = `<span class="vb-version-badge vb-latest-badge">✓ 已是最新</span>`;
    } else {
      el.sub.textContent = '无法获取最新版本';
    }

    // Cache changelog: only store if version matches
    if (data.latest_version && data.changelog && Object.keys(data.changelog).length) {
      _setCachedChangelog(data.latest_version, data.changelog);
    }

    // Action buttons
    let btns = '';
    if (data.update_available) {
      btns += `<button class="vb-btn vb-btn-primary" id="vb-update-btn" onclick="_doUpdate()">
        <span class="vb-btn-icon">⬆</span> 更新
      </button>`;
    }
    btns += `<button class="vb-btn" id="vb-changelog-btn" onclick="_toggleChangelog()">
      <span class="vb-btn-icon">📋</span> 更新日志
    </button>`;
    if (data.html_url) {
      btns += `<a class="vb-btn" href="${escapeHtml(data.html_url)}" target="_blank" rel="noopener">
        <span class="vb-btn-icon">🔗</span> GitHub
      </a>`;
    }
    el.actions.innerHTML = btns;

  } catch (e) {
    el.sub.textContent = '版本检查失败';
    el.local.textContent = 'v—';
  }
}

function _toggleChangelog() {
  const panel = $('#changelog-panel');
  if (!panel) return;

  _changelogOpen = !_changelogOpen;

  if (_changelogOpen) {
    panel.classList.add('open');
    // If no content yet, load and animate
    if (!panel.innerHTML.trim() && _versionData) {
      // Try localStorage cache first
      const ver = _versionData.latest_version;
      const cached = ver ? _getCachedChangelog(ver) : null;
      if (cached) {
        _versionData.changelog = cached;
      }
      _renderChangelog(panel, _versionData);
    }
  } else {
    panel.classList.remove('open');
  }
}

function _renderChangelog(panel, data) {
  const cl = data.changelog || {};
  const keys = Object.keys(cl);

  if (!keys.length) {
    panel.innerHTML = `
      <div class="cl-header">
        <div class="cl-title">📋 更新日志</div>
        <div class="cl-close" onclick="_toggleChangelog()">✕</div>
      </div>
      <div class="cl-empty">暂无更新日志信息</div>`;
    return;
  }

  const published = data.published_at ? new Date(data.published_at).toLocaleDateString('zh-CN') : '';

  // Build category HTML — items have data-text attribute for animation
  let catHTML = '';
  let flatIdx = 0;
  for (const [cat, items] of Object.entries(cl)) {
    const catIcon = cat.split(' ')[0];
    const catName = cat.split(' ').slice(1).join(' ');
    catHTML += `
      <div class="cl-category">
        <div class="cl-cat-header">
          ${catIcon} ${catName}
          <span class="cl-cat-count">${items.length}</span>
        </div>
        <div class="cl-items">
          ${items.map(item => `<div class="cl-item" data-cl-idx="${flatIdx++}"><span class="cl-text">${escapeHtml(item)}</span></div>`).join('')}
        </div>
      </div>`;
  }

  panel.innerHTML = `
    <div class="cl-header">
      <div class="cl-title">
        📋 更新日志
        <span class="vb-version-badge">v${escapeHtml(data.latest_version || '')}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        ${published ? `<span class="cl-meta">${published}</span>` : ''}
        <div class="cl-close" onclick="_toggleChangelog()">✕</div>
      </div>
    </div>
    ${catHTML}`;

  // ── Typewriter animation: character-by-character reveal ──
  _animateChangelog(panel);
}

function _animateChangelog(panel) {
  const categories = panel.querySelectorAll('.cl-category');
  const allItems = panel.querySelectorAll('.cl-item');
  if (!allItems.length) return;

  // ── Phase 1: Category cascade (waterfall stagger) ──
  const CAT_STAGGER = 180; // ms between categories
  categories.forEach((cat, ci) => {
    cat.style.animationDelay = (ci * CAT_STAGGER) + 'ms';
    cat.classList.add('cl-cat-in');
    // Also animate the header
    const hdr = cat.querySelector('.cl-cat-header');
    if (hdr) {
      hdr.style.animationDelay = (ci * CAT_STAGGER + 60) + 'ms';
      hdr.classList.add('cl-hdr-in');
    }
  });

  // ── Phase 2: Item typewriter reveal (line-by-line waterfall) ──
  const totalItems = allItems.length;
  // Adaptive timing: faster for large changelogs
  const ITEM_STAGGER = totalItems > 100 ? 25 : totalItems > 40 ? 35 : 50;
  const firstCatDelay = CAT_STAGGER; // items start after first category appears

  allItems.forEach((item, i) => {
    const delay = firstCatDelay + i * ITEM_STAGGER;
    item.style.animationDelay = delay + 'ms';
    // Staggered reveal: opacity + clip-path (typewriter wipe) + slide
    item.classList.add('cl-item-in');
  });

  // ── Phase 3: Cursor follows the typing ──
  let cursor = document.createElement('div');
  cursor.className = 'cl-typing-cursor';
  panel.appendChild(cursor);

  let curIdx = 0;
  const CURSOR_STEP = ITEM_STAGGER;
  const firstItemDelay = firstCatDelay;

  function moveCursor() {
    if (curIdx >= totalItems) {
      cursor.classList.add('cl-cursor-done');
      return;
    }
    const item = allItems[curIdx];
    const rect = item.getBoundingClientRect();
    const panelRect = panel.getBoundingClientRect();
    // Position cursor below the current item
    cursor.style.top = (rect.bottom - panelRect.top + panel.scrollTop) + 'px';
    cursor.style.left = (rect.left - panelRect.left + 12) + 'px';
    cursor.style.opacity = '1';
    curIdx++;
    setTimeout(moveCursor, CURSOR_STEP);
  }

  // Start cursor after first item appears
  setTimeout(moveCursor, firstItemDelay + 80);

  // Auto-remove cursor after all items revealed
  const totalTime = firstItemDelay + totalItems * CURSOR_STEP + 500;
  setTimeout(() => {
    cursor.classList.add('cl-cursor-done');
    setTimeout(() => cursor.remove(), 600);
  }, totalTime);
}

async function _doUpdate() {
  const btn = $('#vb-update-btn');
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="vb-btn-icon">⏳</span> 更新中…';

  try {
    await fetch(API + '/version/update', {
      method: 'POST',
      headers: authHeaders(),
    });

    // Poll status
    const poll = setInterval(async () => {
      try {
        const st = await api('/version/update/status');
        if (st.status === 'done') {
          clearInterval(poll);
          btn.innerHTML = '<span class="vb-btn-icon">✅</span> 更新完成';
          toast('Hermes 更新成功！刷新页面生效', 'success');
          // Refresh version info after 2s
          setTimeout(() => _checkVersion(), 2000);
        } else if (st.status === 'error') {
          clearInterval(poll);
          btn.innerHTML = '<span class="vb-btn-icon">❌</span> 更新失败';
          btn.disabled = false;
          toast('更新失败: ' + (st.output || '未知错误'), 'error');
        }
        // else still running, keep polling
      } catch {
        // keep polling
      }
    }, 3000);
  } catch (e) {
    btn.innerHTML = '<span class="vb-btn-icon">⬆</span> 更新';
    btn.disabled = false;
    toast('启动更新失败', 'error');
  }
}

// ── Sessions page: stats header + collapsible channel groups ──────────
function renderSpPage(sessions) {
  // Group by source
  const groups = {};
  sessions.forEach(s => {
    const src = s.source || 'unknown';
    if (!groups[src]) groups[src] = [];
    groups[src].push(s);
  });

  // Source display order + labels
  const srcOrder = ['weixin','telegram','discord','slack','whatsapp','mattermost','cron','tui','cli','unknown'];
  const srcLabels2 = { weixin:'微信', telegram:'Telegram', discord:'Discord', slack:'Slack', whatsapp:'WhatsApp', mattermost:'Mattermost', cron:'定时任务', tui:'TUI', cli:'CLI', unknown:'未知' };

  const sorted = Object.keys(groups).sort((a, b) => {
    // Sort by most recent session within each group
    const ma = groups[a].reduce((best, s) => { const t = new Date(s.started_at); return t > best ? t : best; }, 0);
    const mb = groups[b].reduce((best, s) => { const t = new Date(s.started_at); return t > best ? t : best; }, 0);
    return mb - ma;
  });

  // Overall stats
  const activeCount  = sessions.filter(s => isTrulyActive(s)).length;
  const totalMsgs   = sessions.reduce((t, s) => t + (s.message_count || 0), 0);
  const totalTokens = sessions.reduce((t, s) => t + (s.input_tokens || 0) + (s.output_tokens || 0), 0);
  const totalCost   = sessions.reduce((t, s) => t + (s.cost || 0), 0);

  // Build accordion HTML
  const accordions = sorted.map(src => {
    const srcSessions = groups[src];
    const activeOnes  = srcSessions.filter(s => isTrulyActive(s));
    const doneOnes    = srcSessions.filter(s => !isTrulyActive(s));
    const label       = srcLabels2[src] || src;
    const emoji       = chEmoji(src);

    // Sort each group by started_at desc (most recent first)
    const sortByTime = arr => [...arr].sort((a, b) => new Date(b.started_at) - new Date(a.started_at));

    const rows = [
      ...sortByTime(activeOnes).map(s => buildSpSessionRow(s, true)),
      ...sortByTime(doneOnes).map(s => buildSpSessionRow(s, false)),
    ].join('');

    return `
      <div class="sp-group" data-src="${src}">
        <div class="sp-group-header" onclick="toggleSpGroup(this)">
          <div class="sp-group-title">
            <span class="sp-group-emoji">${emoji}</span>
            <span class="sp-group-name">${label}</span>
            <span class="sp-group-count">${srcSessions.length}</span>
            ${activeOnes.length > 0 ? `<span class="sp-group-active-badge">${activeOnes.length} 进行中</span>` : ''}
          </div>
          <div class="sp-group-arrow">▾</div>
        </div>
        <div class="sp-group-body">${rows}</div>
      </div>`;
  }).join('');

  $('#app').innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title-row" style="margin-bottom:14px">
        <div class="card-title"><span class="card-title-icon">◆</span>会话</div>
      </div>
      <div class="sp-stats-card">
        <div class="sp-stat"><div class="sp-stat-value">${sessions.length}</div><div class="sp-stat-label">会话总数</div></div>
        <div class="sp-stat"><div class="sp-stat-value green">${activeCount}</div><div class="sp-stat-label">进行中</div></div>
        <div class="sp-stat"><div class="sp-stat-value">${fmtNum(totalMsgs)}</div><div class="sp-stat-label">消息总数</div></div>
        <div class="sp-stat"><div class="sp-stat-value accent">${fmtNum(totalTokens)}</div><div class="sp-stat-label">Token 总量</div></div>
        <div class="sp-stat"><div class="sp-stat-value">${fmtCost(totalCost)}</div><div class="sp-stat-label">费用合计</div></div>
      </div>
    </div>
    <div id="sp-list">${accordions}</div>`;

  // Attach click handlers
  $$('.sp-session-row').forEach(el => {
    el.addEventListener('click', () => openSpDetail(el.dataset.session, el));
  });
}

// Toggle accordion group
function toggleSpGroup(header) {
  const group = header.parentElement;
  const body  = group.querySelector('.sp-group-body');
  const arrow = group.querySelector('.sp-group-arrow');
  const isOpen = group.classList.contains('open');
  if (isOpen) {
    group.classList.remove('open');
    body.style.display = 'none';
    arrow.textContent = '▾';
  } else {
    group.classList.add('open');
    body.style.display = '';
    arrow.textContent = '▴';
  }
}

// ── Flat list (unused, kept for compatibility) ─────────────────────────
function renderSpFlat(sessions) {
  $('#sp-list').innerHTML = sessions.map(s => buildSpSessionRow(s, isTrulyActive(s))).join('');
  $$('.sp-session-row').forEach(el => el.addEventListener('click', () => openSpDetail(el.dataset.session, el)));
}

// ── Session row ─────────────────────────────────────────────────────
function isTrulyActive(s) {
  if (!s.ended_at) {
    // Session without ended_at: only active if started within last 2 hours
    try {
      const start = new Date(s.started_at.endsWith('Z') ? s.started_at : s.started_at.replace(' ', 'T'));
      return (Date.now() - start.getTime()) < 2 * 60 * 60 * 1000;
    } catch { return false; }
  }
  return false;
}

function buildSpSessionRow(s, active) {
  const spinner = active
    ? `<div class="session-spinner"></div>`
    : `<div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface-2);border-radius:8px;flex-shrink:0">${chEmoji(s.source)}</div>`;
  const totalTokens = (s.input_tokens || 0) + (s.output_tokens || 0);
  return `
    <div class="sp-session-row${active ? ' active' : ''}" data-session="${s.id}">
      <div class="sp-row-icon">${spinner}</div>
      <div class="sp-row-main">
        <div class="sp-row-id">${s.id}</div>
        <div class="sp-row-meta">
          <span class="sp-row-src">${srcLabels[s.source]||s.source||'—'}</span>
          <span class="dot">·</span>
          <span>${s.model || '—'}</span>
          <span class="dot">·</span>
          <span>${fmtNum(s.message_count||0)} 条</span>
          <span class="dot">·</span>
          <span>${fmtNum(totalTokens)} tokens</span>
        </div>
      </div>
      <div class="sp-row-cost"><strong>¥${(s.cost||0).toFixed(2)}</strong></div>
      <div class="sp-row-time">${timeAgo(s.started_at)}</div>
    </div>`;
}

// ── Session detail (inline inside sp-sessions) ─────────────────────
async function openSpDetail(sessionId, rowEl) {
  // Toggle if same session
  const existing = $(`[data-sp-detail="${sessionId}"]`);
  if (existing) { existing.remove(); return; }

  // Remove any other open detail first
  $$('[data-sp-detail]').forEach(el => el.remove());

  try {
    const data = await api(`/sessions/${sessionId}`);
    const msgs = data.messages || [];

    const detailHTML = `
      <div class="sp-detail-drawer" data-sp-detail="${sessionId}">
        <div class="sp-detail-meta">
          <span class="sp-detail-meta-item">🤖 ${escapeHtml(data.model||'—')}</span>
          <span class="sp-detail-meta-item">💬 ${data.message_count||0} 条</span>
          <span class="sp-detail-meta-item">📥 ${fmtNum(data.input_tokens||0)} in</span>
          <span class="sp-detail-meta-item">📤 ${fmtNum(data.output_tokens||0)} out</span>
          <span class="sp-detail-meta-item">💰 ¥${(data.cost||0).toFixed(2)}</span>
          <span class="sp-detail-meta-item">⏱ ${timeAgo(data.started_at)}</span>
          ${data.ended_at
            ? '<span class="badge badge-offline">已结束</span>'
            : '<span class="badge badge-active">进行中</span>'}
        </div>
        <div class="sp-detail-messages">
          ${msgs.length ? msgs.map(m => `
            <div class="msg ${m.role==='user'?'msg-user':'msg-assistant'}">
              <div class="msg-role">${m.role==='user'?'User':m.role==='assistant'?'Assistant':m.role}</div>
              <div class="msg-content">${renderMarkdown(m.content||'')}</div>
              ${m.content ? `<button class="msg-copy" data-copy="${escapeHtml(m.content).replace(/"/g,'&quot;')}">📋</button>` : ''}
            </div>`).join('') : '<div class="text-muted text-sm" style="padding:12px">暂无消息内容</div>'}
        </div>
      </div>`;

    rowEl.insertAdjacentHTML('afterend', detailHTML);

    $$('.msg-copy').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const text = btn.getAttribute('data-copy').replace(/&quot;/g,'"');
        navigator.clipboard.writeText(text).then(() => toast('已复制','success')).catch(() => toast('复制失败','error'));
      });
    });
  } catch (e) {
    toast('加载会话详情失败: ' + e.message, 'error');
  }
}




/* ─── RENDER: Tokens ──────────────────────────────────────────────── */
async function renderTokens() {
  $('#app').innerHTML = '<div class="loading"><div class="spinner-lg"></div></div>';
  try {
    const [stats, sessionsData, quota] = await Promise.all([api('/stats'), api('/sessions?limit=200'), api('/quota')]);
    const sessions = sessionsData.sessions || [];

    // Model names and icons for quota display
    const modelNames = { 'MiniMax-M*': 'AI 对话', 'music-2.6': '音乐生成', 'music-cover': '音乐封面', 'lyrics_generation': '歌词生成', 'coding-plan-vlm': '代码模型', 'coding-plan-search': '搜索模型' };
    const modelIcons = { 'MiniMax-M*': '🤖', 'music-2.6': '🎵', 'music-cover': '🎤', 'lyrics_generation': '📝', 'coding-plan-vlm': '💻', 'coding-plan-search': '🔍' };
    const activeModels = (quota.models || []).filter(m => m.interval_total > 0 || m.weekly_total > 0);
    const defaultModel = activeModels.find(m => m.name === 'MiniMax-M*') || activeModels[0];
    const modelTitleStr = defaultModel ? (modelNames[defaultModel.name] || defaultModel.name) + ' ' + (modelIcons[defaultModel.name] || '') : '';

    // Model distribution
    const modelMap = {};
    sessions.forEach(s => {
      const m = s.model || 'unknown';
      if (!modelMap[m]) modelMap[m] = { in: 0, out: 0, cost: 0 };
      modelMap[m].in += s.input_tokens || 0;
      modelMap[m].out += s.output_tokens || 0;
      modelMap[m].cost += s.cost || 0;
    });

    const modelColors = ['#0066cc', '#34c759', '#ff9f0a', '#ff3b30', '#af52de', '#5ac8fa', '#ffcc00'];
    const modelEntries = Object.entries(modelMap).sort((a, b) => (b[1].in+b[1].out) - (a[1].in+a[1].out));
    const totalTokens = modelEntries.reduce((s, [, v]) => s + v.in + v.out, 0);

    // Source distribution
    const sourceMap = {};
    sessions.forEach(s => {
      const src = s.source || 'unknown';
      if (!sourceMap[src]) sourceMap[src] = { count: 0, in: 0, out: 0 };
      sourceMap[src].count++;
      sourceMap[src].in += s.input_tokens || 0;
      sourceMap[src].out += s.output_tokens || 0;
    });

    // 30-day trend + cost per day
    const dayMap = {};
    sessions.forEach(s => {
      if (!s.started_at) return;
      const day = s.started_at.slice(0, 10);
      if (!dayMap[day]) dayMap[day] = { in: 0, out: 0, msgs: 0, cost: 0 };
      dayMap[day].in += s.input_tokens || 0;
      dayMap[day].out += s.output_tokens || 0;
      dayMap[day].msgs += s.message_count || 0;
      dayMap[day].cost += s.cost || 0;
    });

    const last30days = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      last30days.push({ day: key, ...(dayMap[key] || { in: 0, out: 0, msgs: 0, cost: 0 }) });
    }

    const maxDayTokens = Math.max(1, ...last30days.map(d => d.in + d.out));
    const days = stats.system_started
      ? Math.max(1, Math.round((Date.now() - new Date(stats.system_started).getTime()) / 86400000))
      : 1;

    // Pie chart SVG (filter out 'unknown')
    const pieData = modelEntries.filter(([name]) => name !== 'unknown').slice(0, 7).map(([name, v], i) => {
      const pct = totalTokens ? Math.round((v.in + v.out) / totalTokens * 100) : 0;
      return { name, ...v, pct, color: modelColors[i % modelColors.length] };
    });

    const pieTotal = pieData.reduce((s, d) => s + d.in + d.out, 0);
    let cumPct = 0;
    const pieSlices = pieData.map(d => {
      const start = cumPct;
      cumPct += (d.in + d.out) / pieTotal * 100;
      const startRad = start / 100 * 2 * Math.PI - Math.PI / 2;
      const endRad = cumPct / 100 * 2 * Math.PI - Math.PI / 2;
      const x1 = 40 + 35 * Math.cos(startRad), y1 = 40 + 35 * Math.sin(startRad);
      const x2 = 40 + 35 * Math.cos(endRad), y2 = 40 + 35 * Math.sin(endRad);
      const large = (cumPct - start) > 50 ? 1 : 0;
      return `<path d="M40,40 L${x1.toFixed(2)},${y1.toFixed(2)} A35,35 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${d.color}" />`;
    });

    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    const monthStart = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;

    const monthDays = [];
    for (let i = 1; i <= daysInMonth; i++) {
      const d = new Date(currentYear, currentMonth, i);
      const key = d.toISOString().slice(0, 10);
      monthDays.push({ day: key, dayNum: i, ...(dayMap[key] || { in: 0, out: 0, msgs: 0, cost: 0 }) });
    }

    // ── Trend chart: input + output both shown, with legend ──────────────────
    const fmtK = (n) => n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 1e3 ? Math.round(n / 1e3) + 'K' : n;
    const W = 760, H = 160, PAD_L = 2, PAD_R = 52, PAD_T = 16, PAD_B = 28;
    const chartW = W - PAD_L - PAD_R, chartH = H - PAD_T - PAD_B;
    const stepX = chartW / (daysInMonth - 1 || 1);
    const maxIn  = Math.max(1, ...monthDays.filter(d => d.in  > 0).map(d => d.in));
    const maxOut = Math.max(1, ...monthDays.filter(d => d.out > 0).map(d => d.out));
    const maxVal = Math.max(maxIn, maxOut);

    const buildLine = (getVal) => {
      if (monthDays.length < 2) return '';
      const pts = monthDays.map((d, i) => ({
        x: PAD_L + i * stepX,
        y: PAD_T + chartH - (getVal(d) / maxVal) * chartH
      }));
      let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const [x1, y1] = [pts[i].x, pts[i].y];
        const [x2, y2] = [pts[i+1].x, pts[i+1].y];
        const [px0, py0] = i > 0 ? [pts[i-1].x, pts[i-1].y] : [x1, y1];
        const [px1, py1] = i + 2 < pts.length ? [pts[i+2].x, pts[i+2].y] : [x2, y2];
        d += ` C${(x1 + (x2 - px0)/6).toFixed(1)},${(y1 + (y2 - py0)/6).toFixed(1)} ${(x2 - (px1 - x1)/6).toFixed(1)},${(y2 - (py1 - y1)/6).toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}`;
      }
      return d;
    };

    const lineIn  = buildLine(d => d.in);
    const lineOut = buildLine(d => d.out);
    const areaIn  = lineIn  + ` L${PAD_L + chartW},${PAD_T + chartH} Z`;
    const areaOut = lineOut + ` L${PAD_L + chartW},${PAD_T + chartH} Z`;

    const yLabels = [
      { v: maxVal, y: PAD_T },
      { v: maxVal * 0.5, y: PAD_T + chartH * 0.5 },
      { v: 0, y: PAD_T + chartH },
    ];
    const yAxis = yLabels.map(({ v, y }) =>
      `<text x="${W - PAD_R + 4}" y="${(y + 4).toFixed(1)}" class="axis-label" text-anchor="start">${fmtK(v)}</text>`
    ).join('');
    const gridLines = yLabels.map(({ y }) =>
      `<line x1="${PAD_L}" y1="${y.toFixed(1)}" x2="${PAD_L + chartW}" y2="${y.toFixed(1)}" stroke="var(--ink-4)" stroke-width="0.5" stroke-dasharray="3,3"/>`
    ).join('');
    const xLabelDays = monthDays.map((d, i) => ({ i, dayNum: d.dayNum }))
      .filter(({ i, dayNum }) => i === 0 || i === monthDays.length - 1 || (dayNum % 5 === 0));
    const xAxis = xLabelDays.map(({ i, dayNum }) => {
      const x = PAD_L + i * stepX;
      return `<text x="${x.toFixed(1)}" y="${H - 4}" class="axis-label" text-anchor="middle">${dayNum}日</text>`;
    }).join('');

    const barSection = monthDays.length > 0
      ? `<svg id="trend-svg" viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
          <defs>
            <linearGradient id="areaGradIn" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#0066cc" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#0066cc" stop-opacity="0.04"/>
            </linearGradient>
            <linearGradient id="areaGradOut" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e07b39" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#e07b39" stop-opacity="0.04"/>
            </linearGradient>
          </defs>
          ${gridLines}
          <path d="${areaIn}"  fill="url(#areaGradIn)" />
          <path d="${areaOut}" fill="url(#areaGradOut)" />
          <path d="${lineIn}"  fill="none" stroke="#0066cc" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <path d="${lineOut}" fill="none" stroke="#e07b39" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          ${yAxis}
          ${xAxis}
        </svg>`
      : '<div class="text-muted text-sm">本月暂无数据</div>';

    const barLegend = monthDays.length > 0
      ? `<div style="display:flex;gap:16px;margin-top:6px;padding:0 2px">
           <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-3)">

           </span>
           <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-3)">
             <svg width="20" height="2"><line x1="0" y1="1" x2="20" y2="1" stroke="#e07b39" stroke-width="2"/></svg>输出 Token
           </span>
         </div>`
      : '';


    $('#app').innerHTML = `
      <div class="card" style="margin-bottom:16px">
        <div class="card-title-row" style="margin-bottom:14px">
          <div class="card-title"><span class="card-title-icon">◆</span>${modelTitleStr ? modelTitleStr + ' ' : ''}Token 分析</div>

        </div>
        <div class="hero-grid">
          <div class="hero-card"><div class="hero-label">输入 Token</div><div class="hero-value">${fmtNum(stats.total_input_tokens)}</div><div class="hero-sub">${totalTokens ? Math.round(stats.total_input_tokens / (stats.total_input_tokens + stats.total_output_tokens) * 100) + '%' : '—'}</div></div>
          <div class="hero-card"><div class="hero-label">输出 Token</div><div class="hero-value">${fmtNum(stats.total_output_tokens)}</div><div class="hero-sub">${totalTokens ? Math.round(stats.total_output_tokens / (stats.total_input_tokens + stats.total_output_tokens) * 100) + '%' : '—'}</div></div>

          <div class="hero-card"><div class="hero-label">日均 Token</div><div class="hero-value">${fmtNum(Math.round((stats.total_input_tokens + stats.total_output_tokens) / days))}</div><div class="hero-sub">日均消息 ${fmtNum(Math.round(sessions.reduce((s, x) => s + (x.message_count||0), 0) / days))}</div></div>
        </div>

        </div>
      </div>
      ` : ''}

      <div class="card" style="margin-bottom:16px;padding:14px 0">
        <div class="card-title-row" style="margin-bottom:14px;padding:0 22px">
          <div class="card-title"><span class="card-title-icon">◆</span>本月趋势</div>

          })()}
        </div>
      </div>

      <div class="card-row-2col" style="margin-bottom:16px">
        <div class="card-col">
          <div class="card" style="height:100%">
            <div class="card-title-row" style="margin-bottom:12px">
              <div class="card-title"><span class="card-title-icon">◆</span>模型分布</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${pieData.length ? pieData.map(d => `
                <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface-2);border-radius:10px">
                  <div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;background:${d.color}"></div>

                    <div style="font-size:11px;color:var(--ink-3);margin-top:1px">${fmtNum(d.in+d.out)} tokens</div>
                  </div>
                  <span style="font-size:12px;font-weight:600;color:var(--ink-2)">${d.pct}%</span>
                </div>`).join('') : '<div style="text-align:center;padding:16px 0;color:var(--ink-3);font-size:13px">暂无数据</div>'}
            </div>
          </div>
        </div>
        <div class="card-col">
          <div class="card" style="height:100%">
            <div class="card-title-row" style="margin-bottom:12px">
              <div class="card-title"><span class="card-title-icon">◆</span>来源分布</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${Object.entries(sourceMap).sort((a,b) => (b[1].in+b[1].out)-(a[1].in+a[1].out)).length ? Object.entries(sourceMap).sort((a,b) => (b[1].in+b[1].out)-(a[1].in+a[1].out)).map(([src, v]) => `
                <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface-2);border-radius:10px">
                  <div style="width:28px;height:28px;border-radius:7px;background:var(--surface-1);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${chEmoji(src)}</div>
                  <div style="flex:1;min-width:0">
                    <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${srcLabels[src] || src}</div>
                    <div style="font-size:11px;color:var(--ink-3);margin-top:1px">${fmtNum(v.count)} 会话</div>
                  </div>
                  <span style="font-size:12px;font-weight:600;color:var(--ink-2)">${fmtNum(v.in+v.out)}</span>
                </div>`).join('') : '<div style="text-align:center;padding:16px 0;color:var(--ink-3);font-size:13px">暂无数据</div>'}
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px">
        <div class="card-title-row" style="margin-bottom:12px">
          <div class="card-title"><span class="card-title-icon">◆</span>每日明细</div>
          <span style="font-size:12px;color:var(--ink-3)">${daysInMonth} 天</span>
        </div>
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table style="width:100%;min-width:580px;border-collapse:collapse;font-size:12px;table-layout:fixed">
          <colgroup>
            <col style="width:12%">
            <col style="width:10%">
            <col style="width:10%">
            <col style="width:10%">
            <col style="width:10%">
            <col style="width:48%">
          </colgroup>
          <thead><tr style="border-bottom:1px solid var(--border)">
            <th style="text-align:left;padding:8px 10px;color:var(--ink-3);font-weight:500;white-space:nowrap">日期</th>
            <th style="text-align:right;padding:8px 10px;color:var(--ink-3);font-weight:500">输入</th>
            <th style="text-align:right;padding:8px 10px;color:var(--ink-3);font-weight:500">输出</th>
            <th style="text-align:right;padding:8px 10px;color:var(--ink-3);font-weight:500">消息</th>
            <th style="text-align:right;padding:8px 10px;color:var(--ink-3);font-weight:500">费用</th>
            <th style="text-align:left;padding:8px 10px;color:var(--ink-3);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">模型汇总</th>
          </tr></thead>
          <tbody id="daily-table"></tbody>
        </table>
        </div>
      </div>`;

    // Daily table — group by model per day
    const dayModelMap = {};
    sessions.forEach(s => {
      if (!s.started_at) return;
      const day = s.started_at.slice(0, 10);
      const model = s.model || 'unknown';
      if (!dayModelMap[day]) dayModelMap[day] = {};
      if (!dayModelMap[day][model]) dayModelMap[day][model] = { in: 0, out: 0 };
      dayModelMap[day][model].in += s.input_tokens || 0;
      dayModelMap[day][model].out += s.output_tokens || 0;
    });

    const recentDays = monthDays.filter(d => d.in + d.out > 0).slice(-14).reverse();
    const dayCostMap = {};
    sessions.forEach(s => {
      if (!s.started_at) return;
      const day = s.started_at.slice(0, 10);
      dayCostMap[day] = (dayCostMap[day] || 0) + (s.cost || 0);
    });
    $('#daily-table').innerHTML = recentDays.length > 0
      ? recentDays.map(d => {
          const dayModels = dayModelMap[d.day] || {};
          const topModels = Object.entries(dayModels)
            .filter(([m]) => m !== 'unknown')
            .sort((a, b) => (b[1].in+b[1].out) - (a[1].in+a[1].out))
            .slice(0, 3)
            .map(([m, v]) => `${m}: ${fmtNum(v.in+v.out)}`);
          const modelSummary = topModels.length > 0 ? topModels.join(' · ') : '—';
          const dayCost = dayCostMap[d.day] || d.cost || 0;
          return `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:7px 10px;text-align:left;white-space:nowrap;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis">${d.day}</td>
            <td style="padding:7px 10px;text-align:right;color:var(--ink-2);font-variant-numeric:tabular-nums">${fmtNum(d.in)}</td>
            <td style="padding:7px 10px;text-align:right;color:var(--ink-2);font-variant-numeric:tabular-nums">${fmtNum(d.out)}</td>
            <td style="padding:7px 10px;text-align:right;color:var(--ink-2);font-variant-numeric:tabular-nums">${fmtNum(d.msgs)}</td>
            <td style="padding:7px 10px;text-align:right;color:var(--ink-2);font-variant-numeric:tabular-nums">${dayCost > 0 ? fmtCost(dayCost) : '—'}</td>
            <td style="padding:7px 10px;text-align:left;color:var(--ink-3);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${modelSummary}</td>
          </tr>`;
        }).join('')
      : '<tr><td colspan="6" style="padding:12px;text-align:center;color:var(--ink-3);font-size:13px">本月暂无数据</td></tr>';

  } catch (e) {
    $('#app').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div>`;
  }
}



/* ─── RENDER: Cron ───────────────────────────────────────────────── */
async function renderCron() {
  $('#app').innerHTML = '<div class="loading"><div class="spinner-lg"></div></div>';
  try {
    const data = await api('/cron');
    cache.cron = data.jobs || [];
    renderCronList(cache.cron);
  } catch (e) {
    $('#app').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div>`;
  }
}

function renderCronList(jobs) {
  $('#app').innerHTML = `
    <div class="card">
      <div class="card-title-row">
        <div class="card-title"><span class="card-title-icon">⏰</span>Cron 任务</div>
        <button class="btn btn-primary btn-sm" id="btn-new-cron">+ 新建任务</button>
      </div>
      <div id="cron-list" style="margin-top:12px">
        ${jobs.length ? jobs.map(j => buildCronCardHTML(j)).join('') : `
          <div class="empty"><div class="empty-icon">⏰</div><div class="empty-text">暂无定时任务</div></div>`}
      </div>
    </div>`;

  $$('.cron-card').forEach(card => {
    card.querySelectorAll('.btn[data-action]').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const id = card.dataset.id;
        const action = btn.dataset.action;
        try {
          if (action === 'delete') {
            if (!confirm('确认删除此任务？')) return;
            const r = await fetch(`${API}/cron/${id}`, { method: 'DELETE', headers: authHeaders() }).then(r => r.json());
            if (r.ok) { toast('已删除', 'success'); renderCron(); } else toast('删除失败: ' + (r.error || ''), 'error');
          } else {
            const r = await fetch(`${API}/cron/${id}/${action}`, { method: 'POST', headers: authHeaders() }).then(r => r.json());
            if (r.ok) { toast(action === 'pause' ? '已暂停' : action === 'resume' ? '已恢复' : '已触发', 'success'); renderCron(); }
            else toast('操作失败: ' + (r.error || ''), 'error');
          }
        } catch (e) { toast(e.message, 'error'); }
      });
    });
  });

  $('#btn-new-cron').addEventListener('click', () => showModal('cron-create'));
}

function buildCronCardHTML(j) {
  const status = j.enabled === false ? 'paused' : 'active';
  return `
    <div class="cron-card" data-id="${j.id}">
      <div class="cron-header">
        <div>
          <div class="cron-name">${escapeHtml(j.name || j.id)}</div>
          <div class="cron-schedule">${escapeHtml(j.schedule || j.next_run || '—')}</div>
        </div>
        <div class="cron-actions">
          <span class="${badgeClass(status === 'active' ? 'online' : 'paused')}">${status === 'active' ? '运行中' : '已暂停'}</span>
          ${status === 'active'
            ? `<button class="btn btn-secondary btn-sm" data-action="pause">⏸</button>`
            : `<button class="btn btn-success btn-sm" data-action="resume">▶️</button>`}
          <button class="btn btn-secondary btn-sm" data-action="run">▶ 立即执行</button>
          <button class="btn btn-danger btn-sm" data-action="delete">🗑</button>
        </div>
      </div>
      <div class="cron-meta">
        ${j.next_run ? `<span>下次: ${escapeHtml(j.next_run)}</span>` : ''}
        ${j.last_run ? `<span>上次: ${escapeHtml(j.last_run)}</span>` : ''}
        ${j.repeat ? `<span>重复: ${escapeHtml(typeof j.repeat === 'object' ? (j.repeat.completed !== undefined ? `已执行 ${j.repeat.completed} 次` : JSON.stringify(j.repeat)) : String(j.repeat))}</span>` : ''}
        ${j.deliver ? `<span>投递: ${escapeHtml(j.deliver)}</span>` : ''}
      </div>
      ${j.prompt ? `<div class="text-sm text-muted mt-2" style="font-size:12px;line-height:1.5;background:none">${escapeHtml(j.prompt).slice(0, 120)}${j.prompt.length > 120 ? '…' : ''}</div>` : ''}
    </div>`;
}

      const modelInp = $('#ms-model-input');
      if (provModels.length) {
        modelSel.innerHTML = provModels.map(m => '<option value="' + escapeHtml(m.id) + '">' + escapeHtml(m.id) + '</option>').join('');
        if (cfgModel) modelSel.value = cfgModel;
        modelSel.style.display = '';
        modelInp.style.display = 'none';
      } else {
        modelSel.style.display = 'none';
        modelInp.style.display = '';
        modelInp.value = cfgModel;
      }
    })();

    // Cancel
    $('#ms-cancel-btn').addEventListener('click', () => {
      $('#cm-switch-panel').style.display = 'none';
      $('#cm-switch-btn').textContent = '⚡ 切换模型';
    });

    // Save — POST to /api/config/model
    $('#ms-save-btn').addEventListener('click', async () => {
      const btn = $('#ms-save-btn');
      btn.disabled = true;
      btn.textContent = '保存中…';
      const model = $('#ms-model-select').style.display !== 'none'
        ? $('#ms-model-select').value.trim()
        : $('#ms-model-input').value.trim();
      try {
        const res = await fetch(API + '/config/model', {
          method: 'POST',
          headers: { ...authHeaders(), 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            provider: selectedProv,
            base_url: $('#ms-base-url').value.trim(),
            api_key: $('#ms-api-key').value.trim(),
            model: model,
          }),
        }).then(r => r.json());
        if (res.error) throw new Error(res.error);
        // Broadcast model change so dashboard/quota can refresh
        window.dispatchEvent(new CustomEvent('model-changed', { detail: { provider: selectedProv, model } }));
        toast('模型已切换: ' + model, 'success');
        // Refresh the page after short delay
        setTimeout(() => renderModels(), 1200);
      } catch (e) {
        toast('保存失败: ' + e.message, 'error');
        btn.disabled = false;
        btn.textContent = '保存并应用';
      }
    });

    // Model card click → select as active
    document.querySelectorAll('.model-card-grid').forEach(card => {
      card.addEventListener('click', () => {
        const modelId = card.dataset.model;
        const provId  = card.dataset.provider;
        // Trigger provider chip click
        const chip = $('#ms-prov-chips').querySelector('[data-prov="' + provId + '"]');
        if (chip) chip.click();
        // Set model value
        const modelSel = $('#ms-model-select');
        const modelInp = $('#ms-model-input');
        if (modelSel.style.display !== 'none') {
          modelSel.value = modelId;
        } else {
          modelInp.value = modelId;
        }
        // Auto-open switch panel
        const panel = $('#cm-switch-panel');
        if (panel.style.display === 'none') {
          panel.style.display = 'block';
          $('#cm-switch-btn').textContent = '✕ 收起';
        }
        // Scroll to switch panel
        panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });

  } catch (e) {
    $('#app').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">' + escapeHtml(e.message) + '</div></div>';
  }
}

function renderSkillsList(skills) {
  const byCategory = {};

    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(s);
  });
  const categories = Object.keys(byCategory).sort();

  const categoryHTML = categories.map(cat => {
    const icon = CATEGORY_ICONS[cat] || '📦';
    const color = CATEGORY_COLORS[cat] || '#007aff';
    return `
    <div class="skill-category-section">
      <div class="skill-category-header">
        <span class="skill-category-icon" style="background:${color}20;color:${color}">${icon}</span>
        <span class="skill-category-label">${escapeHtml(cat)}</span>
        <span class="skill-category-count">${byCategory[cat].length}</span>
      </div>
      <div class="skill-grid">
        ${byCategory[cat].map(s => {
          const sIcon = CATEGORY_ICONS[cat] || DEFAULT_ICONS[s.name] || '📦';
          return `
          <div class="skill-card" data-name="${escapeHtml(s.name)}" style="--card-accent:${color}">
            <div class="skill-card-inner">
              <div class="skill-card-icon" style="background:${color}15;color:${color}">${sIcon}</div>

                <div class="skill-card-desc">${escapeHtml(s.description || '暂无描述')}</div>

  $('#app').innerHTML = `

        <div class="card-title"><span class="card-title-icon">⚡</span>技能中心</div>

  const attachEvents = () => {
    $$('.skill-card').forEach(card => {
      card.addEventListener('click', () => showSkillDetail(card.dataset.name));
    });
  };

  attachEvents();

  $('#skill-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    if (!q) {
      $('#skill-content').innerHTML = categoryHTML;
      attachEvents();
      $('#skill-empty').classList.add('hidden');
      return;
    }
    const filtered = skills.filter(s =>
      s.name.toLowerCase().includes(q) ||
      (s.description||'').toLowerCase().includes(q) ||
      (s.category||'').toLowerCase().includes(q)
    );
    if (!filtered.length) {
      $('#skill-content').innerHTML = '';
      $('#skill-empty').classList.remove('hidden');
      return;

    const filteredByCat = {};

      const cat = s.category || 'Other';
      if (!filteredByCat[cat]) filteredByCat[cat] = [];
      filteredByCat[cat].push(s);
    });
    const filteredCats = Object.keys(filteredByCat).sort();
    $('#skill-content').innerHTML = filteredCats.map(cat => {
      const icon = CATEGORY_ICONS[cat] || '📦';

function renderLogsViewer(logFiles) {
  let currentFile = logFiles[0]?.name || 'agent.log';
  let currentLevel = '';
  let currentKw = '';

  function loadLogs() {
    const params = new URLSearchParams({ action: 'read', file: currentFile, limit: 300 });
    if (currentLevel) params.set('level', currentLevel);
    if (currentKw) params.set('keyword', currentKw);
    api('/logs?' + params.toString()).then(data => {
      const lines = (data.lines || []).reverse();
      $('#log-content').innerHTML = lines.length
        ? lines.map(line => {
            let cls = 'log-line';
            if (/ERROR|FATAL|exception/i.test(line)) cls += ' log-line-error';
            else if (/WARN/i.test(line)) cls += ' log-line-warn';
            else if (/INFO|debug/i.test(line)) cls += ' log-line-info';
            return `<div class="${cls}">${escapeHtml(line)}</div>`;
          }).join('')
        : '<div class="text-muted text-sm" style="padding:12px">无日志内容</div>';
      $('#log-count').textContent = lines.length + ' 行';
    }).catch(() => {
      $('#log-content').innerHTML = '<div class="text-muted text-sm" style="padding:12px">加载失败</div>';
    });
  }

  $('#app').innerHTML = `
    <div class="card log-page-card">
      <div class="card-title-row">
        <div class="card-title"><span class="card-title-icon">📋</span>日志</div>
        <span style="font-size:12px;color:var(--ink-3)">${logFiles.length} 个文件</span>
      </div>
      <div class="log-file-list" id="log-file-list" style="margin-top:12px"></div>
      <div class="log-filter-row">
        <div class="search-wrap" style="flex:1;max-width:260px">
          <span class="search-icon">🔍</span>
          <input id="log-kw" class="search-input" type="search" placeholder="关键词…" />
        </div>
        <div class="log-level-filter">
          <button class="log-level-btn active" data-level="">全部</button>
          <button class="log-level-btn" data-level="ERROR">ERROR</button>
          <button class="log-level-btn" data-level="WARN">WARN</button>
          <button class="log-level-btn" data-level="INFO">INFO</button>
        </div>
        <span class="text-xs text-muted" id="log-count"></span>
      </div>
      <div class="log-content" id="log-content"><div class="loading text-sm">加载中…</div></div>
    </div>`;

  $('#log-file-list').innerHTML = logFiles.map(f => `
    <button class="log-file-btn${f.name === currentFile ? ' active' : ''}" data-file="${escapeHtml(f.name)}">
      ${escapeHtml(f.name)} <span class="text-muted">(${fmtBytes(f.size)})</span>
    </button>`).join('');

  $$('.log-file-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.log-file-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFile = btn.dataset.file;
      loadLogs();
    });
  });

  $$('.log-level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.log-level-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLevel = btn.dataset.level;
      loadLogs();
    });
  });

  let kwTimer;
  $('#log-kw').addEventListener('input', e => {
    clearTimeout(kwTimer);
    kwTimer = setTimeout(() => { currentKw = e.target.value; loadLogs(); }, 300);
  });

  loadLogs();
}
