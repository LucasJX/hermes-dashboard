function showModal(type, extra) {
  let content = '';
  if (type === 'cron-create') {
    const presets = [
      { label: '每5分钟', value: '*/5 * * * *' },
      { label: '每小时', value: '0 * * * *' },
      { label: '每天9点', value: '0 9 * * *' },
      { label: '每天18点', value: '0 18 * * *' },
      { label: '每周一', value: '0 9 * * 1' },
      { label: '每月1号', value: '0 9 1 * *' },
    ];
    content = `
      <div class="modal-header"><h2>新建 Cron 任务</h2><button class="modal-close" id="modal-close">×</button></div>
      <div class="form-group"><div class="form-label">任务名称</div>
        <input class="form-input" id="cron-name" type="text" placeholder="可选名称…" /></div>
      <div class="form-group"><div class="form-label">执行周期 *</div>
        <input class="form-input" id="cron-schedule" type="text" placeholder="30m / every 2h / 0 9 * * *" />
        <div class="flex gap-2 mt-2 flex-wrap">${presets.map(p => `<button class="btn btn-secondary btn-sm cron-preset" data-val="${p.value}">${p.label}</button>`).join('')}</div>
      </div>
      <div class="form-group"><div class="form-label">任务描述</div>
        <textarea class="form-textarea" id="cron-prompt" placeholder="任务指令或提示…"></textarea></div>
      <div class="form-group"><div class="form-label">投递目标</div>
        <input class="form-input" id="cron-deliver" type="text" placeholder="origin / local / telegram / weixin" /></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="cron-submit">创建</button>
      </div>`;

  } else if (type === 'skill-detail' && extra) {
    const skill = (cache.skills || []).find(s => s.name === extra);
    content = `
      <div class="modal-header"><h2>${escapeHtml(skill?.name || extra)}</h2><button class="modal-close" id="modal-close">×</button></div>
      <div class="form-group"><div class="form-label">描述</div>
        <div class="text-sm" style="color:var(--ink-2)">${escapeHtml(skill?.description || '暂无描述')}</div></div>
      <div class="form-group"><div class="form-label">路径</div>
        <div class="text-mono text-sm">${escapeHtml(skill?.path || '—')}</div></div>
      <div class="modal-footer"><button class="btn btn-secondary" id="modal-cancel">关闭</button></div>`;
  }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${content}</div>`;
  document.body.appendChild(overlay);

  $('#modal-close').addEventListener('click', () => overlay.remove());
  $('#modal-cancel')?.addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  if (type === 'cron-create') {
    $$('.cron-preset').forEach(btn => {
      btn.addEventListener('click', () => { $('#cron-schedule').value = btn.dataset.val; });
    });
    $('#cron-submit').addEventListener('click', async () => {
      const name = $('#cron-name').value;
      const schedule = $('#cron-schedule').value;
      const prompt = $('#cron-prompt').value;
      const deliver = $('#cron-deliver').value;
      if (!schedule) { toast('请输入执行周期', 'error'); return; }
      try {
        const body = { schedule };
        if (name) body.name = name;
        if (prompt) body.prompt = prompt;
        if (deliver) body.deliver = deliver;
        const r = await fetch('/api/cron', { method: 'POST', headers: { ...authHeaders(), 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(r => r.json());
        if (r.ok) { toast('任务已创建', 'success'); overlay.remove(); renderCron(); }
        else toast('创建失败: ' + (r.error || ''), 'error');
      } catch (e) { toast(e.message, 'error'); }
    });
  }
}

/* ─── Theme Toggle ─────────────────────────────────────────────────── */
function getPreferredTheme() {
  const saved = localStorage.getItem('hermes-theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('hermes-theme', theme);
  const btn = $('#theme-toggle');
  if (btn) btn.textContent = theme === 'dark' ? '🌙' : '☀️';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || getPreferredTheme();
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}

/* ─── Init ────────────────────────────────────────────────────────── */
let _authChecked = false;
let _skipNextHash = false;  // skip next hashchange after navigate() sets hash
async function handleHash() {
  const raw = window.location.hash.slice(1);
  // Priority: URL hash > sessionStorage > default 'dashboard'
  const hash = raw.split('?')[0] || sessionStorage.getItem('hermes-page') || 'dashboard';
  // Sync hash in URL if it was empty (so refresh keeps the page)
  if (!raw) {
    _skipNextHash = true;
    window.location.hash = hash;
  }
  $$('.dk').forEach(el => el.classList.remove('active'));
  const dk = $(`.dk[data-page="${hash}"]`);
  if (dk) dk.classList.add('active');
  const authed = await initAuth();  // wait for auth
  if (!authed) return;
  _authChecked = true;
  navigate(hash);
}
window.addEventListener('hashchange', () => { if (_skipNextHash) { _skipNextHash = false; return; } handleHash(); });

// Listen for model-changed ONCE (was inside renderDashboard causing memory leak)
window.addEventListener('model-changed', () => {
  api('/quota').then(q => { cache.quota = q; }).catch(() => {});
});

window.addEventListener('pageshow', e => {
  if (e.persisted) handleHash();
});

/* ─── Auth Init ─────────────────────────────────────────────────────── */
async function initAuth() {
  applyTheme(getPreferredTheme());
  $('#theme-toggle').addEventListener('click', toggleTheme);
  try {
    const sess = await fetch(API + '/auth/session', { headers: authHeaders(), credentials: 'include' }).then(r => r.json());
    if (sess.logged_in) {
      currentUser = sess;
      $('#login-overlay').style.display = 'none';
      return true;  // authenticated
    }
    // Token existed but is invalid — clear it and show login
    if (getToken()) { setToken(''); window.location.reload(); return false; }
  } catch { }
  showLogin();
  return false;  // not authenticated
}

async function doLogin() {
  const u = $('#li-username').value.trim();
  const p = $('#li-password').value;
  const err = $('#li-error');
  err.style.display = 'none';
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    }).then(r => r.json());
    if (res.ok) {
      setToken(res.token || '');  // store token in localStorage
      showApp(res);
    } else {
      err.textContent = res.error || '登录失败';
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = '网络错误';
    err.style.display = 'block';
  }
}

async function doLogout() {
  await fetch(API + '/auth/logout', { method: 'POST', headers: authHeaders(), credentials: 'include' });
  setToken('');  // clear localStorage token
  sessionStorage.removeItem('hermes-page');  // clear stale page state
  currentUser = null;
  showLogin();
}

/* ─── Show login form ─────────────────────────────────────────────────── */
function showLogin() {
  setToken('');
  $('#login-overlay').style.display = 'flex';
  $('#app').innerHTML = '';
  $('#li-username').value = '';
  $('#li-password').value = '';
  $('#li-error').style.display = 'none';
  $('#li-submit').onclick = doLogin;
  $('#li-password').onkeydown = e => { if (e.key === 'Enter') doLogin(); };
}

/* ─── Post-login: show main UI ─────────────────────────────────────────── */
function showApp(res) {
  currentUser = { user_id: res.user_id, username: res.username, is_admin: res.is_admin };
  $('#login-overlay').style.display = 'none';
  // After login, go to dashboard (fresh login = start at home)
  const target = 'dashboard';
  sessionStorage.setItem('hermes-page', target);
  window.location.hash = target;
  $$('.dk').forEach(el => el.classList.remove('active'));
  const dk = $(`.dk[data-page="${target}"]`);
  if (dk) dk.classList.add('active');
  navigate(target);
}

/* ─── Avatar Menu (Dock Expansion) ──────────────────────────────── */
let rightDockExpanded = false;

function toggleRightDock() {
  const dock = $('#topdock-right');
  const controls = $('#right-controls-expanded');
  rightDockExpanded = !rightDockExpanded;
  if (rightDockExpanded) {
    dock.classList.add('expanded');
    // Animate controls in
    requestAnimationFrame(() => {
      controls.style.opacity = '1';
      controls.style.transform = 'translateX(0)';
    });
  } else {
    controls.style.opacity = '0';
    controls.style.transform = 'translateX(12px)';
    setTimeout(() => dock.classList.remove('expanded'), 300);
  }
}

$('#avatar-btn').addEventListener('click', e => {
  e.stopPropagation();
  toggleRightDock();
});

document.addEventListener('click', e => {
  if (rightDockExpanded && !$('#right-controls-expanded').contains(e.target) && !$('#avatar-btn').contains(e.target)) {
    toggleRightDock();
  }
});

/* ─── Account Page ─────────────────────────────────────────────────── */
async function renderAccount() {
  $('#app').innerHTML = '<div class="loading"><div class="spinner-lg"></div>加载中…</div>';
  let accounts = [];
  let isAdmin = currentUser && currentUser.is_admin;

  if (isAdmin) {
    try { accounts = await api('/auth/accounts'); } catch {}
  }

  const rows = accounts.map(a => `
    <div class="acc-row">
      <div class="acc-info">
        <div class="acc-name">${escHtml(a.username)}</div>
        <div class="acc-meta">${a.is_admin ? '管理员' : '普通用户'} · ${a.created_at}</div>
      </div>
      <div class="acc-actions">
        <button class="acc-btn" onclick="resetAccPwd(${a.id}, '${escHtml(a.username)}')">改密码</button>
        ${a.id !== currentUser.user_id ? `<button class="acc-btn danger" onclick="delAcc(${a.id})">删除</button>` : ''}
      </div>
    </div>`).join('');

  $('#app').innerHTML = `
    <div class="acc-page">
      <div class="page-title-row">
        <div class="page-title">账号管理</div>
      </div>
      <div class="card" style="padding:24px;">
        <div class="acc-current">
          <div class="acc-current-label">当前登录</div>
          <div class="acc-current-name">${escHtml(currentUser.username)} <span class="acc-badge">${currentUser.is_admin ? '管理员' : '普通用户'}</span></div>
        </div>
        ${isAdmin ? `
        <div class="acc-list">${rows || '<div style="color:var(--ink-3);font-size:13px;padding:12px 0;">暂无其他账号</div>'}</div>
        <div class="acc-add">
          <div class="acc-add-title">添加账号</div>
          <div class="acc-add-form">
            <input class="search-input" id="acc-new-user" type="text" placeholder="用户名" style="width:160px;" />
            <input class="search-input" id="acc-new-pass" type="password" placeholder="密码（≥6位）" style="width:160px;" />
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
              <input id="acc-new-admin" type="checkbox" style="width:14px;height:14px;" /> 管理员
            </label>
            <button class="btn btn-primary" id="acc-add-btn">添加</button>
          </div>
        </div>` : ''}
      </div>
    </div>`;

  if (isAdmin) {
    $('#acc-add-btn').onclick = async () => {
      const u = $('#acc-new-user').value.trim();
      const p = $('#acc-new-pass').value;
      const admin = $('#acc-new-admin').checked;
      if (!u || p.length < 6) { toast('用户名至少2字符，密码至少6字符'); return; }
      const res = await fetch(API + '/auth/accounts', {
        method: 'POST', headers: { ...authHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p, is_admin: admin })
      }).then(r => r.json()).catch(() => ({ error: '网络错误' }));
      if (res.error) { toast(res.error); return; }
      toast('账号已添加');
      renderAccount();
    };
  }
}

window.resetAccPwd = async (id, username) => {
  const p = prompt(`为 ${username} 设置新密码（≥6位）：`);
  if (!p || p.length < 6) { if (p !== null) toast('密码至少6位'); return; }
  const res = await fetch(API + '/auth/accounts/password', {
    method: 'PUT', headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, password: p })
  }).then(r => r.json()).catch(() => ({ error: '网络错误' }));
  if (res.error) toast(res.error); else toast('密码已更新');
};

window.delAcc = async (id) => {
  if (!confirm('确定删除该账号？')) return;
  const res = await fetch(API + '/auth/accounts/' + id, {
    method: 'DELETE', headers: authHeaders(), credentials: 'include'
  }).then(r => r.json()).catch(() => ({ error: '网络错误' }));
  if (res.error) toast(res.error); else { toast('已删除'); renderAccount(); }
};

/* ─── Start ────────────────────────────────────────────────────────── */
handleHash();  // initial load → auth check + navigate

</script>
